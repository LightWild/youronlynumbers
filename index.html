<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>编号查询登记系统</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 50px auto; padding: 20px; line-height: 1.6; }
        .box { border: 1px solid #ddd; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background-color: #2ea44f; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #2c974b; }
        #status { margin-top: 20px; padding: 15px; display: none; border-radius: 4px; }
    </style>
</head>
<body>

<div class="box">
    <h2>编号登记查询</h2>
    <input type="text" id="code" placeholder="请输入数字编码 (例如: 12345)">
    <input type="text" id="contact" placeholder="请输入您的联系方式 (文字或数字)">
    <button onclick="checkAndRegister()">点击登记 / 查询</button>
    <div id="status"></div>
</div>

<script>
    // --- 请修改这里 ---
    const REPO_OWNER = "lightwild"; 
    const REPO_NAME = "youronlynumbers";
    // ----------------

    async function checkAndRegister() {
        const code = document.getElementById('code').value.trim();
        const contact = document.getElementById('contact').value.trim();
        const statusDiv = document.getElementById('status');

        if (!code) { alert("请输入编码"); return; }

        statusDiv.style.display = "block";
        statusDiv.innerHTML = "正在数据库中检索...";
        statusDiv.style.background = "#f0f0f0";

        try {
            // 1. 调用 GitHub API 查询是否有包含该编号的 Issue
            // 搜索标题包含该编号且在指定仓库下的 Issue
            const searchUrl = `https://api.github.com/search/issues?q=${code}+repo:${REPO_OWNER}/${REPO_NAME}+in:title`;
            const response = await fetch(searchUrl);
            const data = await response.json();

            if (data.total_count > 0) {
                // 2. 如果找到了
                const issue = data.items[0]; // 取第一个匹配项
                const info = issue.body || "您的伙伴没有留下联系方式。";
                statusDiv.innerHTML = `⚠️ <strong>编码已存在！</strong><br>登记人留下的信息：<br>${info}`;
                statusDiv.style.background = "#fff3cd";
            } else {
                // 3. 如果没找到，引导用户去登记
                statusDiv.innerHTML = `✅ 该编码尚未登记。<br>正在为您跳转到登记页面...`;
                statusDiv.style.background = "#d4edda";
                
                // 构造 Issue 提交链接，自动填充标题和内容
                const registerUrl = `https://github.com/${REPO_OWNER}/${REPO_NAME}/issues/new?title=${code}&body=${encodeURIComponent(contact || "未留下联系方式")}`;
                
                // 延迟 1.5 秒跳转，让用户看清提示
                setTimeout(() => {
                    window.location.href = registerUrl;
                }, 1500);
            }
        } catch (error) {
            statusDiv.innerHTML = "查询失败，请检查网络或稍后再试。";
            statusDiv.style.background = "#f8d7da";
        }
    }
</script>

</body>
</html>
