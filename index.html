<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>号码登记</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        input {
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }
        button {
            padding: 12px;
            font-size: 16px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        #msg {
            margin-top: 10px;
            font-size: 15px;
            min-height: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>号码登记系统</h2>
        <input type="text" id="number" placeholder="请输入登记号码" />
        <input type="text" id="contact" placeholder="请输入联系方式" />
        <button id="submitBtn">立即登记</button>
        <div id="msg"></div>
    </div>

    <!-- JS 放在最后，绝对不会报错 -->
    <script>
        // 获取元素
        const submitBtn = document.getElementById('submitBtn');
        const msg = document.getElementById('msg');

        // 绑定点击事件
        submitBtn.onclick = async function () {
            const number = document.getElementById('number').value.trim();
            const contact = document.getElementById('contact').value.trim();

            if (!number || !contact) {
                msg.innerHTML = "⚠️ 请填写完整信息！";
                msg.style.color = "red";
                return;
            }

            msg.innerHTML = "⏳ 提交中...";
            msg.style.color = "#007bff";

            try {
                const res = await fetch('/api/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ number, contact })
                });

                const data = await res.json();
                if (data.success) {
                    msg.innerHTML = "✅ 登记成功！";
                    msg.style.color = "green";
                } else {
                    msg.innerHTML = "❌ " + data.msg;
                    msg.style.color = "red";
                }
            } catch (err) {
                msg.innerHTML = "❌ 提交失败，请重试";
                msg.style.color = "red";
            }
        };
    </script>
</body>
</html>
