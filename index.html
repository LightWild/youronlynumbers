<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>发票共用检测系统</title>
<style>
*{box-sizing:border-box}
body{max-width:650px;margin:40px auto;padding:0 20px;font-family:system-ui}
h2{text-align:center;color:#222}
.box{border:1px solid #ddd;border-radius:10px;padding:20px;margin-top:20px}
label{display:block;margin:12px 0 6px;font-weight:500}
input{width:100%;padding:10px;border:1px solid #ccc;border-radius:6px;font-size:16px}
button{width:100%;padding:12px;background:#0d6fdc;color:white;border:none;border-radius:8px;font-size:16px;margin-top:20px;cursor:pointer}
.tip{font-size:12px;color:#666;margin-top:4px}
.red{color:red}
.msg{padding:12px;border-radius:6px;margin-top:16px;font-size:15px}
.ok{background:#e8f5e9;color:#1b5e20}
.err{background:#ffebee;color:#b71c1c}
.warn{background:#fff8e1;color:#ff8f00}
.query-box{margin-top:30px;padding-top:20px;border-top:1px solid #eee}
</style>
</head>
<body>
<h2>发票共用检测系统</h2>
<div class="box">
<div class="red">用途：检测平台是否把<b>同一张发票</b>发给多个人</div>

<label>你的联系邮箱（仅用于后台证据留存，不会公开）</label>
<input type="email" id="email" placeholder="请输入你的邮箱" required>
<div class="tip">一个邮箱只能登记一次，防止恶意提交</div>

<label>发票号码（唯一号码，每张发票只有一个）</label>
<input type="text" id="num" placeholder="请输入发票号码" required>

<button id="submit">提交登记</button>
<div id="msg"></div>
</div>

<div class="box query-box">
<h3>🔍 查询发票是否被共用</h3>
<input type="text" id="q_num" placeholder="输入发票号码">
<button id="query" style="background:#28a745;margin-top:10px">查询是否被重复登记</button>
<div id="query_result"></div>
</div>

<script>
// 本地存储
let invoiceRecords = JSON.parse(localStorage.getItem('invoiceRecords')) || {};
let usedEmails = JSON.parse(localStorage.getItem('usedEmails')) || [];

const $ = id => document.getElementById(id);

// 脱敏邮箱：abc123@gmail.com → a***@gmail.com
function maskEmail(email) {
  const [name, domain] = email.split('@');
  return name[0] + '***@' + domain;
}

// 提示信息
function showMsg(text, type) {
  $('msg').innerHTML = `<div class="msg ${type}">${text}</div>`;
}
function showQueryMsg(text, type) {
  $('query_result').innerHTML = `<div class="msg ${type}">${text}</div>`;
}

// 提交
$('submit').onclick = () => {
  const email = $('email').value.trim();
  const num = $('num').value.trim();

  if (!email || !num) {
    showMsg("请填写完整信息", "err");
    return;
  }
  if (!email.includes('@')) {
    showMsg("请输入正确邮箱", "err");
    return;
  }

  // 一个邮箱只能提交一次
  if (usedEmails.includes(email)) {
    showMsg("❌ 该邮箱已登记过，禁止重复提交", "err");
    return;
  }

  // 发票是否已存在
  if (invoiceRecords[num]) {
    showMsg("⚠️ 警告：该发票已被他人登记！存在发票共用嫌疑", "warn");
    return;
  }

  // 保存
  invoiceRecords[num] = email;
  usedEmails.push(email);
  localStorage.setItem('invoiceRecords', JSON.stringify(invoiceRecords));
  localStorage.setItem('usedEmails', JSON.stringify(usedEmails));

  showMsg("✅ 登记成功！该发票暂无重复记录", "ok");
};

// 查询（显示脱敏邮箱，不泄露隐私）
$('query').onclick = () => {
  const num = $('q_num').value.trim();

  if (!num) {
    showQueryMsg("请输入发票号码", "err");
    return;
  }

  if (invoiceRecords[num]) {
    const email = invoiceRecords[num];
    showQueryMsg(`⚠️ 结果：该发票已被登记<br>登记人：${maskEmail(email)}`, "warn");
  } else {
    showQueryMsg("✅ 结果：该发票暂无登记记录", "ok");
  }
};
</script>
</body>
</html>
