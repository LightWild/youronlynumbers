<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>用户登记查询系统</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 400px; margin: auto; }
        input, button { width: 100%; padding: 10px; margin-top: 10px; box-sizing: border-box; }
        #result { margin-top: 20px; padding: 10px; border-radius: 5px; display: none; }
    </style>
</head>
<body>
    <h3>用户登记与查询</h3>
    <input type="text" id="code" placeholder="输入数字编码">
    <input type="text" id="contact" placeholder="输入联系方式（可选）">
    <button onclick="submitData()">点击登记</button>
    <div id="result"></div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzEUr6KatjLjX3xMbQg91dzposNfJy0EBQghh6rOL5HO3V_dhP4WT0-hiWJBXZvUcKE/exec";

        async function submitData() {
            const code = document.getElementById('code').value;
            const contact = document.getElementById('contact').value;
            const resultDiv = document.getElementById('result');

            if (!code) { alert("请输入编码"); return; }

            resultDiv.style.display = "block";
            resultDiv.innerHTML = "正在处理...";
            resultDiv.style.background = "#eee";

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', // 注意：no-cors 模式无法读取返回的 JSON，但可以成功写入
                    body: JSON.stringify({ code: code, contact: contact })
                });

                // 由于 Google Script 的跨域限制，no-cors 无法获取 response body
                // 这里我们做一个简单的逻辑：提示用户已提交，请刷新查看
                resultDiv.innerHTML = "登记请求已发出。如果是查询已有编码，请稍等数据同步或再次输入确认。";
                resultDiv.style.background = "#d4edda";
                
            } catch (error) {
                resultDiv.innerHTML = "提交出错，请检查网络。";
            }
        }
    </script>
</body>
</html>
