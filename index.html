<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字编码登记查询系统</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f6f8fa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(149, 157, 165, 0.2); width: 100%; max-width: 400px; border: 1px solid #d0d7de; }
        h2 { margin-top: 0; color: #24292f; text-align: center; font-size: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #24292f; font-size: 14px; }
        input { width: 100%; padding: 10px; margin-bottom: 16px; border: 1px solid #d0d7de; border-radius: 6px; box-sizing: border-box; font-size: 14px; transition: border-color 0.2s; }
        input:focus { border-color: #0969da; outline: none; box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.3); }
        button { width: 100%; padding: 12px; background-color: #2ea44f; color: white; border: 1px solid rgba(27, 31, 36, 0.15); border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: 600; transition: background-color 0.2s; }
        button:hover { background-color: #2c974b; }
        #status { margin-top: 20px; padding: 16px; border-radius: 6px; display: none; font-size: 14px; line-height: 1.5; word-break: break-all; }
        .loading { color: #57606a; background: #f6f8fa; border: 1px solid #d0d7de; }
        .exists { color: #856404; background: #fff3cd; border: 1px solid #ffeeba; }
        .available { color: #155724; background: #d4edda; border: 1px solid #c3e6cb; }
    </style>
</head>
<body>

<div class="container">
    <h2>编号登记与查询</h2>
    
    <label for="code">数字编码</label>
    <input type="text" id="code" placeholder="例如：123456" autocomplete="off">
    
    <label for="contact">联系方式 (可选)</label>
    <input type="text" id="contact" placeholder="文字或数字">
    
    <button onclick="handleAction()">点击登记 / 查询</button>
    
    <div id="status"></div>
</div>

<script>
    // --- 自动配置好的信息 ---
    const REPO_OWNER = "LightWild"; 
    const REPO_NAME = "youronlynumbers";
    // -----------------------

    async function handleAction() {
        const code = document.getElementById('code').value.trim();
        const contact = document.getElementById('contact').value.trim();
        const statusDiv = document.getElementById('status');

        if (!code) {
            alert("请输入数字编码！");
            return;
        }

        // 1. 显示加载中
        statusDiv.style.display = "block";
        statusDiv.className = "loading";
        statusDiv.innerHTML = "🔍 正在检索数据库，请稍候...";

        try {
            // 2. 调用 GitHub API 查询是否有包含该编号的 Issue
            // q = 标题包含编号 + 仓库名
            const searchUrl = `https://api.github.com/search/issues?q=${encodeURIComponent(code)}+repo:${REPO_OWNER}/${REPO_NAME}+in:title`;
            
            const response = await fetch(searchUrl);
            const data = await response.json();

            // 检查 API 是否报错（如频率限制）
            if (data.message && data.message.includes("API rate limit")) {
                statusDiv.innerHTML = "❌ 查询频繁，请稍后再试。";
                return;
            }

            // 寻找标题完全匹配的项
            const exactMatch = data.items ? data.items.find(item => item.title === code) : null;

            if (exactMatch) {
                // 情况 A: 编码已存在
                statusDiv.className = "exists";
                const info = exactMatch.body || "您的伙伴没有留下联系方式。";
                statusDiv.innerHTML = `⚠️ <strong>该编码已存在！</strong><br><br>登记人留下的联系方式：<br><strong>${info}</strong>`;
            } else {
                // 情况 B: 编码不存在，准备跳转登记
                statusDiv.className = "available";
                statusDiv.innerHTML = `✅ 该编码尚未登记。<br>正在为您跳转到 GitHub 登记页面...`;
                
                // 构造 Issue 提交链接
                // title 是编号，body 是联系方式
                const finalContact = contact ? contact : "您的伙伴没有留下联系方式。";
                const registerUrl = `https://github.com/${REPO_OWNER}/${REPO_NAME}/issues/new?title=${encodeURIComponent(code)}&body=${encodeURIComponent(finalContact)}`;
                
                // 1.5秒后跳转
                setTimeout(() => {
                    window.location.href = registerUrl;
                }, 1500);
            }
        } catch (error) {
            statusDiv.className = "loading";
            statusDiv.innerHTML = "❌ 网络连接失败，请检查您的网络环境。";
            console.error(error);
        }
    }
</script>

</body>
</html>
