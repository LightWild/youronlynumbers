<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>编号重复检测工具</title>
<style>
*{box-sizing:border-box}
body{max-width:650px;margin:40px auto;padding:0 20px;font-family:system-ui}
h2{text-align:center;color:#222}
.box{border:1px solid #ddd;border-radius:10px;padding:20px;margin-top:20px}
label{display:block;margin:12px 0 6px;font-weight:500}
input{width:100%;padding:10px;border:1px solid #ccc;border-radius:6px;font-size:16px}
button{width:100%;padding:12px;background:#0d6fdc;color:white;border:none;border-radius:8px;font-size:16px;margin-top:20px;cursor:pointer}
.tip{font-size:12px;color:#666;margin-top:4px}
.red{color:red}
.msg{padding:12px;border-radius:6px;margin-top:16px;font-size:15px}
.ok{background:#e8f5e9;color:#1b5e20}
.err{background:#ffebee;color:#b71c1c}
.warn{background:#fff8e1;color:#ff8f00}
.query-box{margin-top:30px;padding-top:20px;border-top:1px solid #eee}
.disclaimer{margin-top:30px;font-size:12px;color:#888;border-top:1px solid #eee;padding-top:10px}
</style>
</head>
<body>
<h2>编号重复检测工具</h2>
<div class="box">
<div class="red">功能：检测同一编号是否被多人提交，仅供民间互助参考</div>

<label>您的编号（登记码/标识码）</label>
<input type="text" id="code" placeholder="请输入您的唯一编号" required>

<label>联系邮箱（仅用于脱敏展示）</label>
<input type="email" id="email" placeholder="请输入您的邮箱" required>
<div class="tip">一个邮箱仅可提交一次</div>

<button id="submit">提交检测</button>
<div id="msg"></div>
</div>

<div class="box query-box">
<h3>🔍 查询编号是否重复</h3>
<input type="text" id="q_code" placeholder="输入编号查询">
<button id="query" style="background:#28a745;margin-top:10px">查询是否重复</button>
<div id="query_result"></div>
</div>

<div class="disclaimer">
  声明：本工具为民间公益工具，数据由网友自主上传，非官方平台，不具备法律效力，不代表任何机构立场。使用者自行承担相关责任。
</div>

<script>
// ==================== 你已有的信息（我帮你填好了）====================
const GIST_RAW_URL = "https://gist.githubusercontent.com/LightWild/fe73c32ddd8ad4ec118743edc3fcfd02/raw/77b4e0ef7ca29356a11e1ffc4e420c6139d3f288/gistfile1.txt";
const WEBHOOK_URL = "https://submit-gist.vercel.app/api/submit";
// ==================================================================

const $ = id => document.getElementById(id);

function maskEmail(email) {
  if (!email) return "";
  const [name, domain] = email.split('@');
  return name[0] + "***@" + domain;
}

function showMsg(el, text, type) {
  $(el).innerHTML = `<div class="msg ${type}">${text}</div>`;
}

// 读取数据（查询用）
async function loadData() {
  try {
    const res = await fetch(GIST_RAW_URL);
    return await res.json();
  } catch (e) {
    return { records: [] };
  }
}

// 提交数据（安全提交，不暴露密钥）
$('submit').onclick = async () => {
  const email = $('email').value.trim();
  const code = $('code').value.trim();

  if (!email || !code) {
    showMsg('msg', '请填写完整信息', 'err');
    return;
  }

  try {
    const res = await fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, code })
    });

    const data = await res.json();

    if (data.success) {
      showMsg('msg', '✅ 提交成功！该编号暂无重复', 'ok');
    } else if (data.reason === "email_exists") {
      showMsg('msg', '❌ 该邮箱已提交过', 'err');
    } else if (data.reason === "code_exists") {
      showMsg('msg', `⚠️ 该编号已被登记<br>联系人：${maskEmail(data.existing_email)}`, 'warn');
    } else {
      showMsg('msg', '❌ 提交失败，请稍后重试', 'err');
    }
  } catch (err) {
    showMsg('msg', '❌ 网络错误，请重试', 'err');
  }
};

// 查询
$('query').onclick = async () => {
  const code = $('q_code').value.trim();
  if (!code) {
    showMsg('query_result', '请输入编号', 'err');
    return;
  }

  try {
    const data = await loadData();
    const found = data.records.find(r => r.code === code);

    if (found) {
      showMsg('query_result', `⚠️ 该编号已被登记<br>联系人：${maskEmail(found.email)}`, 'warn');
    } else {
      showMsg('query_result', '✅ 该编号暂无记录', 'ok');
    }
  } catch (e) {
    showMsg('query_result', '❌ 查询失败', 'err');
  }
};
</script>
</body>
</html>
